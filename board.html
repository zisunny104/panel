<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: https://unpkg.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://unpkg.com https://cdn.jsdelivr.net https://cloudflareinsights.com; img-src 'self' data:;">
    <title>實驗管理 | 碩論進行中</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- 外部函式庫 -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>

    <!-- 主要樣式 -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="board-page">
    <button class="panel-toggle-btn" id="panelToggleBtn" onclick="toggleLeftPanel()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="container scrollbar-gray">
        <div class="left-panel">
            <h1 class="experiment-title">實驗管理</h1>

            <div class="input-section board-section" id="experimentSettings">
                <h2>實驗設定</h2>

                <!-- 實驗控制區 -->
                <div id="experimentControlsContainer"></div>

                <!-- 單元組合選擇區域 -->
                <div id="combinationSelectorContainer"></div>

                <!-- 單元選擇與排序 -->
                <div id="unitsPanelContainer"></div>

            </div>

            <!-- 實驗統計資訊 -->
            <div class="input-section board-section is-hidden" id="experimentStats">
                <div class="stats-header">
                    <h2>實驗統計</h2>
                    <button id="exportGestureSequenceBtn" class="btn-export-gesture" title="複製手勢序列"
                        onclick="exportGestureSequence()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-sm">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                        複製序列
                    </button>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">手勢序列</div>
                        <div class="stat-value" id="statGestureCount">0 步</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">涉及單元</div>
                        <div class="stat-value" id="statUnitCount">0</div>
                    </div>
                </div>

                <!-- 統一的實驗日誌面板容器 -->
                <div id="experimentLogContainer"></div>

            </div>


            <!-- 實驗日誌列表 -->
            <div class="input-section board-section" id="experimentLogsList">
                <div class="logs-section-header">
                    <h2>實驗日誌列表</h2>

                    <div class="logs-list-header">
                        <button id="refreshLogsBtn" class="btn-secondary" onclick="loadExperimentLogs()" title="重新整理">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                                stroke-linejoin="round" class="icon-sm">
                                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                                <path d="M21 3v5h-5"></path>
                                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                                <path d="M3 21v-5h5"></path>
                            </svg>
                        </button>
                        <button id="downloadSelectedLogsBtn" class="btn-secondary is-hidden"
                            onclick="downloadSelectedLogs()" title="下載選取">
                            <svg class="svg-icon svg-md" viewBox="0 0 24 24">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7,10 12,15 17,10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                        <button id="deleteSelectedLogsBtn" class="btn-danger is-hidden" onclick="deleteSelectedLogs()"
                            title="刪除選取">
                            <svg class="svg-icon svg-md" viewBox="0 0 24 24">
                                <polyline points="3,6 5,6 21,6"></polyline>
                                <path
                                    d="M19,6v14a2,2 0 0,1-2,2H7a2,2 0 0,1-2-2V6m3,0V4a2,2 0 0,1,2-2h4a2,2 0 0,1,2,2v2">
                                </path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <div id="experimentLogsContainer">
                        <div class="logs-list-loading">載入中...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div id="contentArea">
                <div class="empty-state">
                    <p>請選擇一個教學單元查看詳細內容</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 核心基礎設施 ===== -->
    <!-- Logger（必須最先載入） -->
    <script src="js/core/console-manager.js"></script>
    <!-- WS 協議常數（Server/Client 共用，載入後暴露為 window.WS_PROTOCOL） -->
    <script type="module" src="shared/ws-protocol-constants.js"></script>
    <!-- 同步事件常數（暴露 window.SYNC_EVENTS / window.SYNC_DATA_TYPES，必須在其他預載腳本之前載入） -->
    <script type="module" src="js/constants/sync-events-constants.js"></script>

    <!-- 頁面入口：動態載入並協調所有其他模組 -->
    <script type="module" src="js/board/board-page-manager.js"></script>
</body>

</html>
