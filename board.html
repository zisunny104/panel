<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: https://unpkg.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://unpkg.com https://cdn.jsdelivr.net https://cloudflareinsights.com; img-src 'self' data:;">
    <title>實驗管理 | 碩論進行中</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- 外部函式庫 -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>

    <!-- 主要樣式 -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="board-page">
    <button class="panel-toggle-btn" id="panelToggleBtn">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="container scrollbar-gray">
        <div class="left-panel">
            <h1 class="experiment-title">實驗管理</h1>

            <div class="input-section board-section" id="experimentSettings">
                <h2>實驗設定</h2>
                <!-- 單元組合選擇區域 -->
                <div id="combinationSelectorContainer"></div>

                <!-- 單元選擇與排序 -->
                <div id="unitsPanelContainer"></div>

                <!-- 實驗控制區 -->
                <div id="experimentControlsContainer"></div>

            </div>

            <!-- 實驗狀態資訊 -->
            <div class="input-section board-section is-hidden" id="experimentStats">
                <div class="stats-header">
                    <h2>實驗狀態</h2>
                    <button id="exportGestureSequenceBtn" class="btn-export-gesture" title="複製手勢序列">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-sm">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                        複製序列
                    </button>
                </div>

                <!-- 統一的實驗日誌面板容器 -->
                <div id="experimentLogContainer"></div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">手勢序列</div>
                        <div class="stat-value" id="statGestureCount">0 步</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">涉及單元</div>
                        <div class="stat-value" id="statUnitCount">0</div>
                    </div>
                </div>

            </div>


            <!-- 實驗日誌列表（由 JS 動態渲染） -->
            <div class="input-section board-section" id="experimentLogsList"></div>
        </div>

        <div class="right-panel">
            <div id="contentArea">
                <div class="empty-state">
                    <p>載入中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 核心基礎設施 ===== -->
    <!-- Logger（必須最先載入） -->
    <script type="module" src="js/core/console-manager.js"></script>
    <!-- WS 協定常數（Server/Client 共用，載入後暴露為 window.WS_PROTOCOL） -->
    <script type="module" src="shared/ws-protocol-constants.js"></script>
    <!-- 常數入口（暴露 window.SYNC_EVENTS / window.SYNC_DATA_TYPES / window.ACTION_CONSTANTS） -->
    <script type="module" src="js/constants/index.js"></script>

    <!-- 頁面入口：動態載入並協調所有其他模組 -->
    <script type="module" src="js/board/board-page-manager.js"></script>

    <!-- ===== 實驗模擬工具（開發/測試用，生產環境可刪除） ===== -->
    <!--
        ExperimentSimulator - 模擬用戶操作的獨立工具
        用途：簡化測試流程，不修改主項目代碼
        使用：window.simulateExperiment() 或 window.simulateExperiment({ options })
        刪除：安全刪除，無依賴或後門
    -->
    <script type="module" src="js/board/experiment-simulator.js"></script>
</body>

</html>
