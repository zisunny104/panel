<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: https://unpkg.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://unpkg.com https://cdn.jsdelivr.net https://cloudflareinsights.com; img-src 'self' data:;">
    <title>實驗管理 | 碩論進行中</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- 主要樣式 -->
    <link rel="stylesheet" href="css/style.css" data-versioned>
</head>

<body class="board-page board-booting" data-board-stage="dependency_ready">
    <button class="panel-toggle-btn" id="panelToggleBtn">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="container scrollbar-gray">
        <div class="left-panel">
            <h1 class="experiment-title">實驗管理</h1>

            <div class="input-section board-section" id="experimentSettings">
                <h2>實驗設定</h2>
                <!-- 單元組合選擇區域 -->
                <div id="combinationSelectorContainer"></div>

                <!-- 單元選擇與排序 -->
                <div id="unitsPanelContainer"></div>

                <!-- 實驗控制區 -->
                <div id="experimentControlsContainer"></div>

            </div>

            <!-- 實驗狀態資訊 -->
            <div class="input-section board-section is-hidden" id="experimentStats">
                <div class="stats-header">
                    <h2>實驗狀態</h2>
                    <button id="exportGestureSequenceBtn" class="btn-export-gesture" title="複製手勢序列">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sm">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                        複製序列
                    </button>
                </div>

                <!-- 統一的實驗日誌面板容器 -->
                <div id="recordContainer"></div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">手勢序列</div>
                        <div class="stat-value" id="statGestureCount">0 步</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">涉及單元</div>
                        <div class="stat-value" id="statUnitCount">0</div>
                    </div>
                </div>

            </div>


            <!-- 實驗日誌列表（由 JS 動態渲染） -->
            <div class="input-section board-section" id="recordsList"></div>
        </div>

        <div class="right-panel">
            <div id="contentArea">
                <div class="empty-state">
                    <p>載入中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 核心基礎設施 ===== -->
    <!-- Logger（必須最先載入） -->
    <script type="module">
        import { bootstrapPage } from "./js/core/app-bootstrap.js";

        bootstrapPage({
            entryModules: [
                "./js/core/console-manager.js",
                "./shared/ws-protocol-constants.js",
                "./js/constants/index.js",
                "./js/board/board-page-manager.js",
                "./js/board/experiment-simulator.js",
            ],
        });
    </script>
</body>

</html>
