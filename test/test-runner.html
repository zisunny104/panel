<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel 專案測試執行器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 32px;
      color: #667eea;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 16px;
    }

    .controls {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }

    .btn-clear {
      background: #f0f0f0;
      color: #333;
    }

    .phase-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .phase-filters button {
      padding: 8px 16px;
      font-size: 13px;
    }

    .stats {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .stat-card {
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    .stat-card.passed {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
    }

    .stat-card.failed {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .stat-value {
      font-size: 36px;
      font-weight: bold;
      color: #333;
    }

    .output-container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 2px solid #eee;
    }

    .output-header h2 {
      color: #667eea;
      font-size: 20px;
    }

    #console-output {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #console-output::-webkit-scrollbar {
      width: 8px;
    }

    #console-output::-webkit-scrollbar-track {
      background: #2d2d2d;
      border-radius: 4px;
    }

    #console-output::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 4px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .log-error {
      color: #ff6b6b;
    }

    .log-success {
      color: #51cf66;
    }

    .log-info {
      color: #74c0fc;
    }

    .log-section {
      color: #ffd43b;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧪 Panel 專案測試執行器</h1>
      <p class="subtitle">實驗模組重構測試系統 - Phase 1-5</p>
    </header>

    <div class="controls">
      <div class="button-group">
        <button class="btn-primary" onclick="runAllTests()">▶ 執行所有測試</button>
        <button class="btn-clear" onclick="clearConsole()">🗑️ 清除輸出</button>
      </div>
      
      <div class="phase-filters">
        <strong style="align-self: center; margin-right: 10px;">依階段篩選:</strong>
        <button class="btn-success" onclick="runPhaseTests('Phase 2')">Phase 2</button>
        <button class="btn-success" onclick="runPhaseTests('Phase 3')">Phase 3</button>
        <button class="btn-success" onclick="runPhaseTests('Phase 4')">Phase 4</button>
        <button class="btn-success" onclick="runPhaseTests('Phase 5')">Phase 5</button>
      </div>
    </div>

    <div class="stats">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">總測試數</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card passed">
          <div class="stat-label">✓ 通過</div>
          <div class="stat-value" id="stat-passed">0</div>
        </div>
        <div class="stat-card failed">
          <div class="stat-label">✗ 失敗</div>
          <div class="stat-value" id="stat-failed">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">成功率</div>
          <div class="stat-value" id="stat-rate">0%</div>
        </div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在執行測試...</p>
    </div>

    <div class="output-container">
      <div class="output-header">
        <h2>📋 控制台輸出</h2>
        <span id="test-time"></span>
      </div>
      <div id="console-output">等待執行測試...</div>
    </div>
  </div>

  <!-- 載入測試框架 -->
  <script src="test-utils.js"></script>

  <!-- 載入所有測試規格 -->
  <script src="specs/experiment-hub-manager.spec.js"></script>
  <script src="specs/experiment-combination-manager.spec.js"></script>
  <script src="specs/experiment-flow-manager.spec.js"></script>
  <script src="specs/experiment-action-handler.spec.js"></script>
  <script src="specs/experiment-ui-manager.spec.js"></script>

  <script>
    // 攔截 console 輸出
    const consoleOutput = document.getElementById('console-output');
    const originalConsole = {
      log: console.log,
      error: console.error,
      warn: console.warn,
      info: console.info
    };

    function appendToConsole(message, type = 'log') {
      const timestamp = new Date().toLocaleTimeString('zh-TW');
      let className = '';
      let prefix = '';

      switch(type) {
        case 'error':
          className = 'log-error';
          prefix = '✗';
          break;
        case 'success':
          className = 'log-success';
          prefix = '✓';
          break;
        case 'info':
          className = 'log-info';
          prefix = 'ℹ';
          break;
        case 'section':
          className = 'log-section';
          prefix = '▶';
          break;
        default:
          className = '';
          prefix = '';
      }

      const line = document.createElement('div');
      line.className = className;
      line.textContent = `[${timestamp}] ${prefix} ${message}`;
      consoleOutput.appendChild(line);
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }

    // 覆寫 console 方法
    console.log = function(...args) {
      originalConsole.log.apply(console, args);
      const message = args.map(arg => 
        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
      ).join(' ');
      
      // 根據內容判斷類型
      if (message.includes('✓')) {
        appendToConsole(message, 'success');
      } else if (message.includes('✗')) {
        appendToConsole(message, 'error');
      } else if (message.includes('='.repeat(10))) {
        appendToConsole(message, 'section');
      } else {
        appendToConsole(message, 'log');
      }
    };

    console.error = function(...args) {
      originalConsole.error.apply(console, args);
      const message = args.join(' ');
      appendToConsole(message, 'error');
    };

    console.warn = function(...args) {
      originalConsole.warn.apply(console, args);
      const message = args.join(' ');
      appendToConsole(message, 'info');
    };

    console.info = function(...args) {
      originalConsole.info.apply(console, args);
      const message = args.join(' ');
      appendToConsole(message, 'info');
    };

    // 清除控制台
    function clearConsole() {
      consoleOutput.innerHTML = '控制台已清除。';
      updateStats({ total: 0, passed: 0, failed: 0 });
    }

    // 更新統計數據
    function updateStats(results) {
      document.getElementById('stat-total').textContent = results.total;
      document.getElementById('stat-passed').textContent = results.passed;
      document.getElementById('stat-failed').textContent = results.failed;
      
      const rate = results.total > 0 
        ? ((results.passed / results.total) * 100).toFixed(2)
        : 0;
      document.getElementById('stat-rate').textContent = rate + '%';
    }

    // 執行所有測試
    async function runAllTests() {
      const loading = document.getElementById('loading');
      loading.classList.add('active');
      clearConsole();
      
      const startTime = Date.now();
      
      try {
        const results = await TestUtils.run();
        updateStats(results);
        
        const endTime = Date.now();
        const duration = ((endTime - startTime) / 1000).toFixed(2);
        document.getElementById('test-time').textContent = `執行時間: ${duration}秒`;
      } catch (error) {
        console.error('測試執行失敗:', error);
      } finally {
        loading.classList.remove('active');
      }
    }

    // 執行特定階段的測試
    async function runPhaseTests(phase) {
      const loading = document.getElementById('loading');
      loading.classList.add('active');
      clearConsole();
      
      const startTime = Date.now();
      console.log(`篩選測試: ${phase}`);
      
      try {
        const results = await TestUtils.run(phase);
        updateStats(results);
        
        const endTime = Date.now();
        const duration = ((endTime - startTime) / 1000).toFixed(2);
        document.getElementById('test-time').textContent = `執行時間: ${duration}秒`;
      } catch (error) {
        console.error('測試執行失敗:', error);
      } finally {
        loading.classList.remove('active');
      }
    }

    // 頁面載入完成後的初始化
    window.addEventListener('load', () => {
      console.info('測試執行器已就緒。請點擊按鈕開始測試。');
    });
  </script>
</body>
</html>
